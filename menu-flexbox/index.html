<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste FlexBox</title>
    <link rel="stylesheet" href="mobile.css" media="screen and
    (max-width: 500px)">
    

    <style>
       body{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: 20px;
        width: 100vw; /* "viewport" Medida relativa à largura da tela. */
        background-color: rgba(68, 60, 60, 0.736);
        height: 100vh; /*medida relativa baseada na altura da tela (viewport).*/ 
       }
       header{
        background-color: gray;
        padding: 20px;
        margin: 10px;

        display: flex; /* Organizar elementos de forma flexível */
        flex-flow: row wrap; /*  (ROW) Os elementos ficam em linha (horizontal)
        Da esquerda → para a direita. (WRAP) Se não couberem na mesma linha... Eles quebram para a próxima linha.*/

        justify-content: center; /*(Centraliza) controlar o espaçamento horizontal entre os elementos. */
        align-items: center; /* Alinhar os itens no eixo cruzado.*/
        flex: 0 0 200px; /* flex-grow + flex-shrink + flex-basis. */
      

        
       }
       header > nav > a{
        margin: 10px;
        text-decoration: none;
        color: rgb(37, 18, 18);
        border-radius: 10px;
        padding: 20px;
        background-color:dimgrey;
        
        

       }
       header > nav{
        display: flex;
        flex-flow: row wrap; /* Coloca itens em linha e quebra quando precisar.*/
        margin-left: 50px; /* Espaçamento entre o H1 e o NAV. */
       }
       header > nav > a:hover{
        color: blue;
        background-color:rgba(119, 136, 153, 0.579);
        transition: 1s;
        
        
       }
       main{
        background-color: rgba(255, 255, 255, 0.533);
        padding: 20px;
        margin: 50px;
        text-indent: 20px; /* Espaço dos paragráfos. */
        text-align: center; /* Texto no centro da página. */
       }
       h1{
        margin-bottom: 20px;
        line-height: 1.2em; 
        text-align: center;
       }
       
    </style>
</head>
<body> 
    <header>
     <h1>Meu site</h1>

      <nav>
       <a href="#">Opção 1</a>
       <a href="#">Opção 2</a>
       <a href="#">Opção 3</a>
      </nav>

    </header>

    <main>
       <h1>Teste de flexbox</h1>
        <p>
             Lorem ipsum dolor sit amet consectetur, adipisicing elit. <br>
              Quaerat nam eligendi repellat. Sequi fuga,<br>
             deserunt nemo perferendis saepe assumenda excepturi? <br> Id tenetur reprehenderit voluptas aut illum. <br> 
             Suscipit necessitatibus magnam porro.
        </p>
    </main>
</body>
</html>
