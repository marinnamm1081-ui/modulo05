<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste FlexBox</title>
    <style>
       body{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-size: 20px;
        width: 100vw; /* "viewport" Medida relativa à largura da tela. */
        background-color: rgba(68, 60, 60, 0.736);
        height: 100vh; /*medida relativa baseada na altura da tela (viewport).*/ 
       }
       header{
        background-color: gray;
        padding: 20px;
        margin: 10px;

        display: flex; /* Organozar elementos de forma flexível */
        flex-flow: row wrap; /*  (ROW) Os elementos ficam em linha (horizontal)
        Da esquerda → para a direita. (WRAP) Se não couberem na mesma linha... Eles quebram para a próxima linha.*/

        justify-content: space-between; /* controlar o espaçamento horizontal entre os elementos. */
        align-items: center;
        flex: 0 0 200px; /* flex-grow + flex-shrink + flex-basis. */

        
       }
       header > nav > a{
        margin: 10px;
        text-decoration: none;
        color: rgb(37, 18, 18);
        margin: 5px;
        border-radius: 10px;
        padding: 20px;

       }
       header > nav{
        display: flex;
        flex-flow: row wrap;
       }
       header > nav > a:hover{
        color: blue;
        background-color: beige;
        transition: .5s;
        
        
       }
       main{
        background-color: rgba(255, 255, 255, 0.533);
        padding: 20px;
        margin: 10px;
        text-indent: 20px;
       }
    </style>
</head>
<body> 
    <header>
      <H1>Meu site</H1>

      <nav>
       <a href="#">Opção 1</a>
       <a href="#">Opção 2</a>
       <a href="#">Opção 3</a>
      </nav>

    </header>

    <main>
        <H1>Teste de FlexBox</H1>
        <p>
             Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quaerat nam eligendi repellat. Sequi fuga,
             deserunt nemo perferendis saepe assumenda excepturi? Id tenetur reprehenderit voluptas aut illum. 
             Suscipit necessitatibus magnam porro.
        </p>
    </main>
</body>
</html>
