<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.container{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row nowrap; /* Os itens não quebram linha mesmo se faltar espaço */
            

        }

        div.item{
            background-color: lightseagreen;
            border:1px solid black;
            text-align: center;
            flex-basis: 200px; /* Tamanho base dos elementos dentro do container */
            
        }
        div#cxA{
           /*flex-shrink: 1;
          flex-grow: 0;
          flex-basis: 200px; */

          flex: 1 0 200px; /* Forma simplificada de GROW, SHRINK E BASIS. */
        } 

        div#cxB{
          flex-shrink: 1;
          flex-grow: 1;
          flex-basis: 200px;
        }
        div#cxC{
          flex-shrink: 1;
          flex-grow: 1;
          flex-basis: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="cxA" >A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
       
    </div> 
</body>
</html>
