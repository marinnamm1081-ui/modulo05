<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        div.container{
            border: 3px solid blue;
            height: 250px;

            display: grid; /* Transforma o container comum em uma grade, onde você pode organizar
            os itens em linhas e colunas.*/

            grid-template-columns: auto  auto auto; /* Serve para definir quantas colunas seu layout vai ter
            e o tamanho deles. */

            grid-template-rows:  auto auto auto; /* Serve para definir a aultura de cada linha. */

            gap: 5px; /* Criar espaço entre itens do grid.*/


        }
        div.item{
            border: 3px solid red;
            padding: 5px
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
    <div class="item">D</div>
    <div class="item">E</div>
    <div class="item">F</div>
    <div class="item">G</div>
    <div class="item">H</div>
    </div>
</body>
</html>
